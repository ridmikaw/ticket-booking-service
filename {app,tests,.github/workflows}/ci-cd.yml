name: CI/CD — Ticket Booking Service (GCP Cloud Run)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT_ID: train-ticketing-490907
  GCP_REGION:     asia-south1
  SERVICE_NAME:   ticket-booking-service
  IMAGE:          asia-south1-docker.pkg.dev/train-ticketing-490907/ticket-booking/ticket-booking-service

jobs:

  # ── Job 1: Tests ──────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Job 2: Security Scan (DevSecOps) ─────────────────────────────────────────
  security:
    name: SAST Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Snyk vulnerability scan
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Job 3: Build & Push to GCP Artifact Registry ─────────────────────────────
  build:
    name: Build & Push to Artifact Registry
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build & push image
        id: build
        run: |
          IMAGE_TAG=${{ env.IMAGE }}:${{ github.sha }}
          docker build -t $IMAGE_TAG -t ${{ env.IMAGE }}:latest .
          docker push $IMAGE_TAG
          docker push ${{ env.IMAGE }}:latest
          echo "image=$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ── Job 4: Deploy to Cloud Run ────────────────────────────────────────────────
  deploy:
    name: Deploy to GCP Cloud Run
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ needs.build.outputs.image }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8000 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --add-cloudsql-instances=train-ticketing-490907:asia-south1:ticket-db \
            --set-env-vars="DATABASE_URL=postgresql://postgres:ticketpass123@/ticket_booking?host=/cloudsql/train-ticketing-490907:asia-south1:ticket-db" \
            --quiet

      - name: Show deployed URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "✅ Deployed: $URL"
          echo "📖 Docs: $URL/docs"