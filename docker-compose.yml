version: "3.9"

services:
  ticket-service:
    build: .
    ports:
      - "8003:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ticket_db
      - TRAIN_SERVICE_URL=http://train-service:8001
      - SEAT_SERVICE_URL=http://seat-service:8002
      - PAYMENT_SERVICE_URL=http://payment-service:8004
    depends_on:
      db:
        condition: service_healthy
    networks:
      - train-booking-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       ticket_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - train-booking-net

volumes:
  postgres_data:

networks:
  train-booking-net:
    driver: bridge
    # Other group members' services connect to this same network
